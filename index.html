<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layanan Kelurahan Tipes</title>
  <style>
    :root {
      --hijau-muda: #dff5e1;
      --hijau: #a8d5ba;
      --hijau-tua: #3f7a5d;
      --teks-gelap: #1f2937;
      --putih: #ffffff;
      --bayangan: 0 10px 25px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--teks-gelap);
      background: var(--hijau-muda) no-repeat fixed center/cover url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?auto=format&fit=crop&w=1600&q=60');
      position: relative;
    }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient( to bottom right, rgba(223, 245, 225, .85), rgba(168, 213, 186, .85) );
      pointer-events: none;
      z-index: -1;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: saturate(1.4) blur(6px);
      background: rgba(255,255,255,.6);
      border-bottom: 1px solid rgba(63,122,93,.15);
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

    .brand {
      display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--teks-gelap);
    }
    .brand .logo {
      width: 40px; height: 40px; border-radius: 12px; background: var(--hijau);
      display: grid; place-items: center; box-shadow: var(--bayangan); font-weight: 800; color: var(--hijau-tua);
    }
    .brand h1 { font-size: 1.25rem; margin: 0; line-height: 1.1; }
    .brand small { display: block; font-size: .8rem; color: #3f7a5db3; }

    .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; }

    .menu { list-style: none; display: flex; margin: 0; padding: 0; gap: 6px; }
    .menu > li { position: relative; }
    .menu > li > a, .menu > li > button {
      appearance: none; border: 0; background: transparent; cursor: pointer;
      padding: 10px 14px; border-radius: 999px; font-weight: 600; text-decoration: none;
      color: var(--teks-gelap);
    }
    .menu > li > a:hover, .menu > li > button:hover { background: var(--hijau); }

    .dropdown-menu {
      position: absolute; top: 100%; left: 0; min-width: 280px; padding: 10px; margin-top: 6px;
      background: var(--putih); border-radius: 16px; box-shadow: var(--bayangan);
      border: 1px solid rgba(63,122,93,.15); display: none;
    }
    .dropdown:hover .dropdown-menu { display: block; }
    .dropdown-menu a {
      display: flex; gap: 10px; align-items: start; text-decoration: none; color: inherit;
      padding: 10px 12px; border-radius: 12px;
    }
    .dropdown-menu a:hover { background: var(--hijau-muda); }

    .hero { text-align: center; padding: 64px 16px 28px; }
    .hero h2 { font-size: clamp(1.6rem, 2.5vw + 1rem, 2.4rem); margin: 0 0 10px; color: var(--hijau-tua); }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-top: 26px; }
